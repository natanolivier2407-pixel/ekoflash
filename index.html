<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EkoflashFR — Générateur de carrousel</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: #060d14;
  color: #fff;
  height: 100vh;
  display: flex;
  overflow: hidden;
}

/* ======== SIDEBAR ======== */
#sidebar {
  width: 320px;
  min-width: 320px;
  background: #0c1520;
  border-right: 1px solid rgba(80,140,240,0.12);
  display: flex;
  flex-direction: column;
  height: 100vh;
}
.sidebar-header {
  padding: 22px 20px 16px;
  border-bottom: 1px solid rgba(80,140,240,0.1);
  flex-shrink: 0;
}
.brand { font-size: 12px; font-weight: 700; letter-spacing: 3px; color: #7aadff; text-transform: uppercase; }
.brand-sub { font-size: 9px; color: #334; letter-spacing: 2px; text-transform: uppercase; margin-top: 3px; }

.form-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 14px 16px;
  scrollbar-width: thin;
  scrollbar-color: #1a2d50 transparent;
}

.form-section {
  margin-bottom: 10px;
  background: #0f1d2e;
  border: 1px solid rgba(80,140,240,0.1);
  border-radius: 10px;
  overflow: hidden;
}
.section-head {
  padding: 9px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(80,140,240,0.05);
  border-bottom: 1px solid rgba(80,140,240,0.08);
}
.section-head-title {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #7aadff;
}
.section-body { padding: 12px; display: flex; flex-direction: column; gap: 9px; }

label { font-size: 9px; color: #446; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 3px; display: block; }
input[type=text], textarea {
  width: 100%;
  background: #081220;
  border: 1px solid rgba(80,140,240,0.18);
  border-radius: 6px;
  color: #c8daf0;
  font-size: 12px;
  padding: 7px 9px;
  font-family: inherit;
  outline: none;
  resize: vertical;
  transition: border-color 0.15s;
}
input[type=text]:focus, textarea:focus { border-color: rgba(122,173,255,0.45); }
textarea { min-height: 56px; line-height: 1.5; }

.note { font-size: 10px; color: #2a3a4a; font-style: italic; }

.btn-remove {
  background: none; border: none;
  color: #2a3a4a; cursor: pointer;
  font-size: 14px; line-height: 1;
  transition: color 0.15s;
}
.btn-remove:hover { color: #c06060; }

.sidebar-actions {
  padding: 12px 16px;
  border-top: 1px solid rgba(80,140,240,0.1);
  display: flex;
  gap: 8px;
  flex-shrink: 0;
}
.btn-add {
  flex: 1;
  padding: 8px 4px;
  border-radius: 7px;
  border: 1px solid rgba(122,173,255,0.2);
  background: rgba(122,173,255,0.05);
  color: #6a9dd8;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  cursor: pointer;
  transition: background 0.15s;
}
.btn-add:hover { background: rgba(122,173,255,0.1); color: #9cc4e8; }

/* ======== PREVIEW ======== */
#preview-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.preview-bar {
  padding: 14px 22px;
  border-bottom: 1px solid rgba(80,140,240,0.1);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.preview-bar-title { font-size: 9px; color: #334; letter-spacing: 2px; text-transform: uppercase; }
.btn-dl-all {
  padding: 7px 18px;
  border-radius: 0px;
  border: 1px solid rgba(122,173,255,0.3);
  background: rgba(122,173,255,0.07);
  color: #9cc4e8;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
  transition: background 0.15s;
}
.btn-dl-all:hover { background: rgba(122,173,255,0.14); }
.btn-dl-all:disabled { opacity: 0.4; cursor: default; }

.cards-scroll {
  flex: 1;
  overflow-x: auto;
  overflow-y: hidden;
  padding: 28px 24px;
  display: flex;
  align-items: center;
  gap: 18px;
  scrollbar-width: thin;
  scrollbar-color: #1a2d50 transparent;
}

.card-wrapper {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 9px;
  flex-shrink: 0;
}
.card-wrapper-label {
  font-size: 8px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #2a3a4a;
}
.btn-dl-one {
  padding: 5px 12px;
  border-radius: 12px;
  border: 1px solid rgba(122,173,255,0.15);
  background: transparent;
  color: #3a5a7a;
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-dl-one:hover { background: rgba(122,173,255,0.08); color: #7aadff; border-color: rgba(122,173,255,0.3); }

/* ======== CHARTE GRAPHIQUE — CARTES ======== */
.card {
  width: 252px;
  height: 315px;
  border-radius: 0px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: 18px 18px;
  position: relative;
  overflow: hidden;
  background: linear-gradient(160deg, #1a2d50 0%, #0e1f3a 55%, #091528 100%);
  border: 1px solid rgba(80,140,240,0.3);
  font-family: 'Segoe UI', system-ui, sans-serif;
}
.card-shine {
  position: absolute;
  top:0; left:0; right:0; bottom:0;
  background:
    linear-gradient(135deg, rgba(180,210,255,0.1) 0%, rgba(0,0,0,0) 40%, rgba(100,160,255,0.05) 100%),
    radial-gradient(ellipse at 20% 0%, rgba(160,200,255,0.1) 0%, transparent 55%);
  pointer-events: none;
  border-radius: 0px;
}
.c-tag { font-size: 8px; letter-spacing: 2.5px; text-transform: uppercase; font-weight: 600; color: #9cc4e8; }
.c-div { height: 1px; background: rgba(156,196,232,0.18); margin: 6px 0; }
.c-bar { width: 26px; height: 2px; background: #7aadff; border-radius: 2px; margin-bottom: 8px; }
.c-foot { font-size: 8px; letter-spacing: 2px; text-transform: uppercase; color: rgba(156,196,232,0.3); }

.c-intro-title { font-size: 16px; font-weight: 800; line-height: 1.3; color: #fff; }
.c-intro-swipe { font-size: 8px; letter-spacing: 2px; text-transform: uppercase; color: rgba(156,196,232,0.4); }
.c-intro-swipe::after { content: ' →'; color: #7aadff; }

.c-stat-val { font-size: 36px; font-weight: 900; line-height: 1; color: #e8d8b8; letter-spacing: -1px; margin-bottom: 6px; }
.c-stat-desc { font-size: 10px; color: #b8cce8; line-height: 1.6; }
.c-stat-src { font-size: 7px; letter-spacing: 1.5px; color: rgba(156,196,232,0.28); text-transform: uppercase; margin-top: 7px; }

.c-txt-section { font-size: 8px; font-weight: 700; color: #7aadff; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
.c-txt-title { font-size: 12px; font-weight: 700; color: #fff; line-height: 1.35; margin-bottom: 7px; }
.c-txt-body { font-size: 10px; color: #96b4d0; line-height: 1.6; }

.c-cta-main { flex:1; display:flex; flex-direction:column; justify-content:center; gap:14px; }
.c-cta-title { font-size: 14px; font-weight: 800; color: #fff; line-height: 1.3; }
.c-cta-title span { color: #e8d8b8; }
.c-cta-btn {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(122,173,255,0.1); border: 1px solid rgba(122,173,255,0.3);
  border-radius: 26px; padding: 7px 14px;
  font-size: 9px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: #9cc4e8;
  width: fit-content;
}
.c-cta-slogan { font-size: 9px; color: rgba(156,196,232,0.3); letter-spacing: 1px; }
.c-cta-handle { font-size: 11px; font-weight: 700; color: #7aadff; letter-spacing: 1px; }

/* ======== MOBILE ======== */
@media (max-width: 760px) {
  body { flex-direction: column; height: auto; min-height: 100vh; overflow-y: auto; }
  #sidebar {
    width: 100%; min-width: 0; height: auto;
    border-right: none; border-bottom: 1px solid rgba(80,140,240,0.12);
  }
  .form-scroll { flex: none; overflow: visible; }
  #content-body { max-height: none !important; }
  #preview-area { overflow: visible; }
  .preview-bar { position: sticky; top: 0; background: #060d14; z-index: 5; }
  .cards-scroll { overflow-x: auto; padding: 18px 14px; }
  input[type=text], textarea { font-size: 16px; } /* évite le zoom auto iOS */
}
</style>
</head>
<body>

<aside id="sidebar">
  <div class="sidebar-header">
    <div class="brand">EkoflashFR</div>
    <div class="brand-sub">Générateur de carrousel</div>
  </div>
  <div class="form-scroll" id="form-area"></div>

  <div id="content-section" style="flex-shrink:0; border-top:1px solid rgba(80,140,240,0.1);">
    <div style="padding:9px 16px; display:flex; align-items:center; justify-content:space-between; background:rgba(80,140,240,0.05); border-bottom:1px solid rgba(80,140,240,0.08); cursor:pointer;" onclick="toggleContent()">
      <span class="section-head-title">Contenu &amp; Légende</span>
      <button class="btn-remove" id="content-arrow" style="font-size:10px;">▼</button>
    </div>
    <div id="content-body" style="display:none; padding:12px 16px; flex-direction:column; gap:9px; overflow-y:auto; max-height:280px; background:#0c1520;">
      <div><label>Importer le contenu (JSON généré par Tony)</label>
      <textarea id="import-json" rows="4" placeholder='{"intro":"…","cards":[…],"caption":"…"}' style="font-family:monospace;font-size:11px;"></textarea></div>
      <button class="btn-add" onclick="importContent()">⤓ Charger le contenu</button>
      <div id="import-status" style="font-size:10px; min-height:14px; color:#7aadff;"></div>
      <div><label>Légende Instagram (pour Metricool)</label><textarea id="ig-caption" rows="6" oninput="saveCaption()"></textarea></div>
      <button class="btn-add" onclick="copyCaption()">⧉ Copier la légende</button>
    </div>
  </div>

  <div class="sidebar-actions" style="flex-direction:column; gap:6px;">
    <div style="display:flex; gap:8px;">
      <button class="btn-add" onclick="addCard('chiffre')">+ Carte chiffre</button>
      <button class="btn-add" onclick="addCard('texte')">+ Carte texte</button>
    </div>
  </div>
</aside>

<div id="preview-area">
  <div class="preview-bar">
    <span class="preview-bar-title">Aperçu · 1080 × 1350 px (4:5)</span>
    <div style="display:flex; gap:8px;">
      <button class="btn-dl-all" id="btn-share" onclick="shareImages()">⇪ Partager</button>
      <button class="btn-dl-all" id="btn-all" onclick="downloadAll()">↓ Tout télécharger</button>
    </div>
  </div>
  <div class="cards-scroll" id="cards-container"></div>
</div>

<script>
const state = {
  intro: `La France a emprunté à taux faible pendant 5 ans.\nElle n'a rien construit.\nLa facture arrive.`,
  cards: [
    {
      type: 'chiffre',
      valeur: '310 Md€',
      label: `C'est l'argent qu'empruntera la France en 2026.\nUn record absolu, jamais atteint, même pendant le Covid.\n850 millions d'euros empruntés chaque jour ouvré.`,
      source: 'Agence France Trésor 2026'
    },
    {
      type: 'texte',
      section: `L'ERREUR STRATÉGIQUE`,
      titre: `De 2015 à 2021, la France empruntait à taux zéro. Une occasion historique d'investir dans des projets ambitieux.`,
      corps: `La France a utilisé cet argent pour du fonctionnement courant et de la redistribution.\nDes dépenses qui ne génèrent aucun retour financier.\nL'argent gratuit a été consommé, il n'a pas été investi.`
    },
    {
      type: 'chiffre',
      valeur: '53 %',
      label: `de la dette française est détenue par des non-résidents.\nFonds étrangers, banques centrales, institutionnels.\nC'est le taux le plus élevé du G7.`,
      source: 'Banque de France 2024'
    },
    {
      type: 'texte',
      section: `CE QUE CELA IMPLIQUE`,
      titre: `Les créanciers étrangers ont un levier de pression sur la politique française.`,
      corps: `Lorsqu'un créancier étranger majeur cède massivement ses obligations françaises, les taux d'emprunt de l'État augmentent.\nEn l'absence d'une demande suffisante sur les marchés, la France s'expose à un risque de défaut.\nLes détenteurs étrangers disposent ainsi d'un levier indirect sur les orientations politiques du pays.`
    },
    {
      type: 'chiffre',
      valeur: '74 Md€',
      label: `C'est les intérêts de la dette en 2026.\nUne dépense à l'échelle du poste de l'éducation nationale.\nChaque année, de la dette à taux faible est remplacée par de la dette à taux plus élevé.\nLa charge de la dette montera mécaniquement dans les prochaines années, même si la France arrêtait de s'endetter demain.`,
      source: 'PLF 2026'
    }
  ]
};

/* ---- ACTIONS ---- */
function addCard(type) {
  if (type === 'chiffre') state.cards.push({ type:'chiffre', valeur:'', label:'', source:'' });
  else                     state.cards.push({ type:'texte', section:'', titre:'', corps:'' });
  render();
}

function removeCard(i) {
  state.cards.splice(i, 1);
  render();
}

function upd(path, val) {
  if (path === 'intro') { state.intro = val; }
  else {
    const [, idx, key] = path.split('.');
    state.cards[+idx][key] = val;
  }
  renderPreview();
}

/* ---- FORM ---- */
function renderForm() {
  const total = state.cards.length + 2;
  let h = '';

  h += `<div class="form-section">
    <div class="section-head"><span class="section-head-title">Carte 1 · Intro</span></div>
    <div class="section-body">
      <div><label>Titre accrocheur</label>
      <textarea rows="3" oninput="upd('intro',this.value)" placeholder="Pourquoi l'État ne peut pas créer de richesse…">${esc(state.intro)}</textarea></div>
    </div>
  </div>`;

  state.cards.forEach((c, i) => {
    const pos = i + 2;
    if (c.type === 'chiffre') {
      h += `<div class="form-section">
        <div class="section-head">
          <span class="section-head-title">Carte ${pos} · Chiffre</span>
          <button class="btn-remove" onclick="removeCard(${i})">✕</button>
        </div>
        <div class="section-body">
          <div><label>Valeur</label><input type="text" value="${esc(c.valeur)}" oninput="upd('cards.${i}.valeur',this.value)" placeholder="57%"></div>
          <div><label>Description</label><textarea rows="2" oninput="upd('cards.${i}.label',this.value)" placeholder="des dépenses publiques sont des transferts sociaux…">${esc(c.label)}</textarea></div>
          <div><label>Source (optionnel)</label><input type="text" value="${esc(c.source)}" oninput="upd('cards.${i}.source',this.value)" placeholder="OCDE 2023"></div>
        </div>
      </div>`;
    } else {
      h += `<div class="form-section">
        <div class="section-head">
          <span class="section-head-title">Carte ${pos} · Texte</span>
          <button class="btn-remove" onclick="removeCard(${i})">✕</button>
        </div>
        <div class="section-body">
          <div><label>Section</label><input type="text" value="${esc(c.section)}" oninput="upd('cards.${i}.section',this.value)" placeholder="Le problème"></div>
          <div><label>Titre</label><textarea rows="2" oninput="upd('cards.${i}.titre',this.value)" placeholder="Formulation forte et directe…">${esc(c.titre)}</textarea></div>
          <div><label>Corps du texte</label><textarea rows="3" oninput="upd('cards.${i}.corps',this.value)" placeholder="Explication, nuance, contexte…">${esc(c.corps)}</textarea></div>
        </div>
      </div>`;
    }
  });

  h += `<div class="form-section">
    <div class="section-head"><span class="section-head-title">Carte ${total} · Call to action</span></div>
    <div class="section-body"><p class="note">Générée automatiquement.</p></div>
  </div>`;

  document.getElementById('form-area').innerHTML = h;
}

/* ---- CARD BUILDERS ---- */
function cardIntro(titre) {
  return `<div class="card" id="cx-intro">
    <div class="card-shine"></div>
    <div><div class="c-tag">EkoflashFR</div><div class="c-div"></div></div>
    <div style="flex:1;display:flex;align-items:center;">
      <div><div class="c-bar"></div>
      <div class="c-intro-title">${nl(titre) || 'Titre du carrousel…'}</div></div>
    </div>
    <div class="c-intro-swipe">Swipe pour comprendre</div>
  </div>`;
}

function cardChiffre(c, pos, total) {
  return `<div class="card" id="cx-${pos}">
    <div class="card-shine"></div>
    <div><div class="c-tag">EkoflashFR · ${pos}/${total}</div><div class="c-div"></div></div>
    <div style="flex:1;display:flex;align-items:center;">
      <div><div class="c-bar"></div>
      <div class="c-stat-val">${esc(c.valeur) || '—'}</div>
      <div class="c-stat-desc">${nl(c.label) || 'Description du chiffre…'}</div>
      ${c.source ? `<div class="c-stat-src">Source · ${esc(c.source)}</div>` : ''}
      </div>
    </div>
    <div class="c-foot">EkoflashFR</div>
  </div>`;
}

function cardTexte(c, pos, total) {
  return `<div class="card" id="cx-${pos}">
    <div class="card-shine"></div>
    <div><div class="c-tag">EkoflashFR · ${pos}/${total}</div><div class="c-div"></div></div>
    <div style="flex:1;display:flex;align-items:center;">
      <div><div class="c-bar"></div>
      <div class="c-txt-section">${esc(c.section) || 'Section'}</div>
      <div class="c-txt-title">${nl(c.titre) || 'Titre de la carte…'}</div>
      <div class="c-txt-body">${nl(c.corps) || 'Corps du texte…'}</div>
      </div>
    </div>
    <div class="c-foot">EkoflashFR</div>
  </div>`;
}

function cardCta(total) {
  return `<div class="card" id="cx-cta">
    <div class="card-shine"></div>
    <div><div class="c-tag">EkoflashFR</div><div class="c-div"></div></div>
    <div class="c-cta-main">
      <div class="c-cta-title">Tu veux comprendre<br><span>l'économie réelle</span>&nbsp;?</div>
      <div class="c-cta-btn">+ Suivre EkoflashFR</div>
    </div>
    <div class="c-cta-handle">@EkoflashFR</div>
  </div>`;
}

/* ---- PREVIEW ---- */
function renderPreview() {
  const total = state.cards.length + 2;
  let h = '';

  h += wrap('Intro', 'intro', cardIntro(state.intro));
  state.cards.forEach((c, i) => {
    const pos = i + 2;
    h += wrap(`Carte ${pos}`, pos, c.type === 'chiffre' ? cardChiffre(c, pos, total) : cardTexte(c, pos, total));
  });
  h += wrap('Call to action', 'cta', cardCta(total));

  document.getElementById('cards-container').innerHTML = h;
}

function wrap(label, id, cardHtml) {
  return `<div class="card-wrapper">
    <div class="card-wrapper-label">${label}</div>
    <div id="w-${id}">${cardHtml}</div>
    <button class="btn-dl-one" onclick="dlOne('${id}','${label}')">↓ PNG</button>
  </div>`;
}

/* ---- DOWNLOAD ---- */
async function dlOne(id, label) {
  const card = document.querySelector(`#w-${id} .card`);
  const canvas = await html2canvas(card, { scale: 4.286, useCORS: true, backgroundColor: null, logging: false });
  const a = document.createElement('a');
  a.download = `ekoflash_${String(label).toLowerCase().replace(/[^a-z0-9]/g,'_')}.png`;
  a.href = canvas.toDataURL('image/png');
  a.click();
}

async function downloadAll() {
  const btn = document.getElementById('btn-all');
  btn.textContent = '⏳ En cours…';
  btn.disabled = true;

  const ids    = ['intro', ...state.cards.map((_,i) => i+2), 'cta'];
  const labels = ['intro', ...state.cards.map((_,i) => `carte_${i+2}`), 'cta'];

  for (let j = 0; j < ids.length; j++) {
    await dlOne(ids[j], labels[j]);
    await new Promise(r => setTimeout(r, 350));
  }

  btn.textContent = '↓ Tout télécharger';
  btn.disabled = false;
}

/* ---- PARTAGE (Web Share API → Metricool / galerie) ---- */
async function captureAllFiles() {
  const ids = ['intro', ...state.cards.map((_, i) => i + 2), 'cta'];
  const files = [];
  for (let j = 0; j < ids.length; j++) {
    const card   = document.querySelector(`#w-${ids[j]} .card`);
    const canvas = await html2canvas(card, { scale: 4.286, useCORS: true, backgroundColor: null, logging: false });
    const blob   = await new Promise(r => canvas.toBlob(r, 'image/png'));
    // préfixe numérique → ordre conservé à la sélection dans Metricool
    files.push(new File([blob], `ekoflash_${String(j + 1).padStart(2, '0')}.png`, { type: 'image/png' }));
  }
  return files;
}

async function shareImages() {
  const btn = document.getElementById('btn-share');
  btn.textContent = '⏳…';
  btn.disabled = true;
  try {
    const files = await captureAllFiles();
    if (navigator.canShare && navigator.canShare({ files })) {
      await navigator.share({ files, title: 'EkoflashFR', text: 'Carrousel EkoflashFR' });
    } else {
      // Fallback (desktop ou navigateur sans partage de fichiers) → téléchargement
      setImportStatus('Partage non dispo ici → téléchargement à la place.', 'working');
      await downloadAll();
    }
  } catch (e) {
    if (e.name !== 'AbortError') setImportStatus('✗ ' + e.message, 'error');
  } finally {
    btn.textContent = '⇪ Partager';
    btn.disabled = false;
  }
}

/* ---- UTILS ---- */
function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function nl(s) {
  return esc(s||'').replace(/\n/g,'<br>');
}

/* ---- CONTENU & LÉGENDE (workflow Metricool) ---- */

function toggleContent() {
  const body  = document.getElementById('content-body');
  const arrow = document.getElementById('content-arrow');
  const show  = body.style.display === 'none';
  body.style.display = show ? 'flex' : 'none';
  arrow.textContent  = show ? '▲' : '▼';
}

function setImportStatus(msg, type) {
  const el = document.getElementById('import-status');
  el.textContent = msg;
  el.style.color = type === 'error' ? '#e07070' : type === 'success' ? '#70e0b0' : '#7aadff';
}

// Applique un contenu { intro, cards:[…], caption } à l'état + à l'UI
function applyContent(data) {
  if (typeof data.intro === 'string') state.intro = data.intro;

  if (Array.isArray(data.cards)) {
    state.cards = data.cards.map(c => {
      if (c.type === 'chiffre') {
        return { type:'chiffre', valeur:c.valeur||'', label:c.label||'', source:c.source||'' };
      }
      return { type:'texte', section:c.section||'', titre:c.titre||'', corps:c.corps||'' };
    });
  }

  if (typeof data.caption === 'string') {
    document.getElementById('ig-caption').value = data.caption;
    saveCaption();
  }

  render();
}

// Charge un contenu collé manuellement dans le panneau "Contenu & Légende"
function importContent() {
  const raw = document.getElementById('import-json').value.trim();
  if (!raw) { setImportStatus('Colle d\'abord le JSON.', 'error'); return; }

  let data;
  try { data = JSON.parse(raw); }
  catch (e) { setImportStatus('JSON invalide : ' + e.message, 'error'); return; }

  applyContent(data);
  setImportStatus(`✓ Contenu chargé (${state.cards.length} cartes).`, 'success');
}

// Pré-remplissage par lien : outil_carrousel.html?data=<base64 UTF-8 du JSON>
function loadFromURL() {
  const params = new URLSearchParams(location.search);
  const raw = params.get('data');
  if (!raw) return;
  try {
    const json = decodeURIComponent(escape(atob(raw.replace(/-/g, '+').replace(/_/g, '/'))));
    applyContent(JSON.parse(json));
  } catch (e) {
    console.warn('Lien ?data= invalide :', e);
  }
}

function saveCaption() {
  localStorage.setItem('ig-caption', document.getElementById('ig-caption').value);
}

function loadCaption() {
  const cap = localStorage.getItem('ig-caption');
  document.getElementById('ig-caption').value = cap !== null ? cap :
    `[chiffre ou contradiction]\n\n[2 angles abordés, sans tout dévoiler]\n\nSwipe pour comprendre ↗\n\n💾 Sauvegarde si t'as appris quelque chose\n👉 Suis @EkoflashFR — des chiffres pas des opinions\n\n#economie #france #liberal #argent #ekoflashfr #tiktokfinance`;
}

async function copyCaption() {
  const txt = document.getElementById('ig-caption').value;
  try {
    await navigator.clipboard.writeText(txt);
    setImportStatus('✓ Légende copiée — colle-la dans Metricool.', 'success');
  } catch (e) {
    setImportStatus('Copie impossible : sélectionne le texte manuellement.', 'error');
  }
}

/* ---- INIT ---- */
function render() { renderForm(); renderPreview(); }
render();
loadCaption();
loadFromURL();  // si ?data= présent, pré-remplit le carrousel
</script>
